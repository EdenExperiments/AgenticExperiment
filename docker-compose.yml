services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: rpgtracker
      POSTGRES_PASSWORD: rpgtracker
      POSTGRES_DB: rpgtracker
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rpgtracker"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db_data:
